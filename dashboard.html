<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑞成智慧茶園 Smart Tea Garden</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .hero { background: linear-gradient(120deg, #2e7d32, #66bb6a); color: white; padding: 2rem 0; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .weather-widget { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; border-left: 5px solid #2196f3; }
        .station-card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.2s; height: 100%; overflow: hidden; }
        .station-card:hover { transform: translateY(-5px); }
        .station-header { background-color: #f1f8e9; color: #2e7d32; padding: 1rem; font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e8f5e9; }
        .metric-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
        .metric-item:last-child { border-bottom: none; }
        .metric-label { color: #555; display: flex; align-items: center; }
        .metric-label i { margin-right: 8px; width: 20px; text-align: center; color: #4caf50; }
        .metric-val { font-weight: bold; color: #333; }
        .status-badge { font-size: 0.8rem; padding: 0.4em 0.8em; }
        .refresh-time { font-size: 0.85rem; color: #666; text-align: right; margin-top: -1rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="hero text-center">
        <div class="container">
            <h1 class="display-5 fw-bold"><i class="fas fa-leaf me-2"></i>瑞成智慧茶園</h1>
            <p class="lead mb-0">Smart Tea Garden Monitoring System</p>
        </div>
    </div>

    <div class="container">
        
        <div class="d-flex justify-content-between align-items-end mb-3">
            <h5 class="mb-0 text-muted"><i class="fas fa-chart-line me-1"></i> 即時監測數據</h5>
            <div class="refresh-time">
                <i class="fas fa-clock me-1"></i> 最後更新: <span id="last-update">載入中...</span>
            </div>
        </div>

        <!-- Weather Widget -->
        <div class="weather-widget">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h3 class="mb-1 text-primary"><i class="fas fa-map-marker-alt me-2"></i><span id="location">南投 名間鄉</span></h3>
                    <div class="text-muted">即時氣象資訊</div>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <span class="fs-4 me-4"><i class="fas fa-temperature-high text-danger me-2"></i><span id="air-temp">--</span>°C</span>
                    <span class="fs-4"><i class="fas fa-tint text-info me-2"></i><span id="air-hum">--</span>%</span>
                </div>
            </div>
        </div>

        <!-- Sensor Grid -->
        <div class="row g-4" id="sensors-container">
            <!-- Loading State -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-2 text-muted">正在讀取茶園數據...</p>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted mt-5">
        <small>&copy; 2026 瑞成智慧茶園 | Powered by OpenClaw</small>
    </footer>

    <script>
        // Configuration
        // This JSON is generated by the Python logger and pushed to the same GitHub Pages repo
        const DATA_URL = 'data.json'; 

        async function fetchData() {
            try {
                // Add cache-busting timestamp
                const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                render(data);
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('sensors-container').innerHTML = 
                    `<div class="col-12 text-center text-danger py-4">
                        <i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>
                        無法讀取數據 (data.json)。<br>
                        <small>請確認 Logger 程式是否正在運行並成功上傳至 GitHub。</small>
                    </div>`;
            }
        }

        function render(data) {
            // Update Header Info
            document.getElementById('last-update').innerText = data.last_update || "--";
            
            // Update Weather
            if (data.weather) {
                document.getElementById('location').innerText = data.weather.location || "南投 名間鄉";
                document.getElementById('air-temp').innerText = data.weather.air_temp || "--";
                document.getElementById('air-hum').innerText = data.weather.humidity || "--";
            }

            // Generate Station Cards
            const container = document.getElementById('sensors-container');
            container.innerHTML = "";

            // Loop 4 stations
            for (let i = 1; i <= 4; i++) {
                const sid = `Station${i}`;
                const vals = data.sensors[sid] || null;

                // If data is missing, show dashes
                const v = vals || {
                    soil_temp: '--', soil_moisture: '--', ec: '--', ph: '--', n: '--', p: '--', k: '--'
                };
                
                const badge = vals ? '<span class="badge bg-success status-badge">Online</span>' : '<span class="badge bg-secondary status-badge">Offline</span>';

                const html = `
                    <div class="col-md-6 col-lg-3">
                        <div class="station-card bg-white h-100">
                            <div class="station-header">
                                <span><i class="fas fa-broadcast-tower me-2"></i>Station ${i}</span>
                                ${badge}
                            </div>
                            <div class="p-3">
                                <div class="text-muted small mb-3"><i class="fas fa-layer-group me-1"></i>深度: Surface</div>
                                
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-thermometer-half"></i>溫度 Temp</span>
                                    <span class="metric-val">${v.soil_temp} °C</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-water"></i>濕度 Moist</span>
                                    <span class="metric-val">${v.soil_moisture} %</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-bolt"></i>導電度 EC</span>
                                    <span class="metric-val">${v.ec} us/cm</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-flask"></i>酸鹼值 pH</span>
                                    <span class="metric-val">${v.ph}</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-seedling"></i>氮 Nitrogen</span>
                                    <span class="metric-val">${v.n} mg/kg</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-leaf"></i>磷 Phosphorus</span>
                                    <span class="metric-val">${v.p} mg/kg</span>
                                </div>
                                <div class="metric-item">
                                    <span class="metric-label"><i class="fas fa-apple-alt"></i>鉀 Potassium</span>
                                    <span class="metric-val">${v.k} mg/kg</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            }
        }

        // Init
        fetchData();
        // Auto-refresh every 60s
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
