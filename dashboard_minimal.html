<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Smart Tea Garden · Minimal Table</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background:#fefefe; font-family:"IBM Plex Sans","Noto Sans TC",sans-serif; }
        header { padding:1.8rem 0; border-bottom:1px solid #f1f5f9; }
        header h1 { font-size:1.8rem; margin-bottom:.25rem; }
        .badge { font-size:.75rem; }
        table { font-size:.92rem; }
        thead th { background:#f8fafc; position:sticky; top:0; z-index:1; }
        tbody tr { transition:background .2s ease; }
        tbody tr:hover { background:#f1f5f9; }
        .weather { background:#0ea5e9; color:#fff; border-radius:20px; padding:1.5rem; margin:2rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center">
            <div>
                <h1>Smart Tea Garden</h1>
                <p class="text-muted">Minimal Google Sheets driven dashboard</p>
            </div>
            <div class="mt-2 mt-md-0">
                <span class="badge bg-primary" id="last-update">--</span>
            </div>
        </header>

        <section class="weather">
            <div class="row g-3 align-items-center">
                <div class="col-md-4">
                    <div class="display-5" id="weather-temp">--°C</div>
                    <p class="mb-0">濕度 <strong id="weather-hum">--%</strong></p>
                    <p class="mb-0">降雨 <strong id="weather-rain">-- mm</strong></p>
                </div>
                <div class="col-md-4">
                    <h5 class="mb-1" id="weather-location">南投 名間鄉</h5>
                    <p class="mb-0">狀況：<span id="weather-desc">--</span></p>
                </div>
                <div class="col-md-4">
                    <small>觀測時間：<span id="weather-time">--</span></small><br>
                    <small>資料來源：Smart Tea Garden rt</small>
                </div>
            </div>
        </section>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Station</th>
                        <th>溫度 °C</th>
                        <th>濕度 %</th>
                        <th>EC us/cm</th>
                        <th>pH</th>
                        <th>氮 N</th>
                        <th>磷 P</th>
                        <th>鉀 K</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>window.DASHBOARD_SHEET_ID = "REPLACE_WITH_REALTIME_SHEET_ID";</script>
    <script src="assets/dashboard-data.js"></script>
    <script>
        const ORDER = [1,2,3,4];

        function renderTable(rows) {
            if (!rows.length) return showError("無資料");
            const latest = dashboardData.latest(rows);
            const stations = dashboardData.groupByStation(rows);
            document.getElementById("last-update").textContent = latest["Timestamp"] || "--";
            document.getElementById("weather-temp").textContent = `${dashboardData.formatNumber(latest["Air Temp"],1)}°C`;
            document.getElementById("weather-hum").textContent = `${dashboardData.formatNumber(latest["Air Hum"],1)}%`;
            document.getElementById("weather-rain").textContent = `${dashboardData.formatNumber(latest["Rainfall"],1)} mm`;
            document.getElementById("weather-location").textContent = latest["Location"] || "南投 名間鄉";
            document.getElementById("weather-desc").textContent = latest["Weather"] || "--";
            document.getElementById("weather-time").textContent = latest["Obs Time"] || "--";

            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            ORDER.forEach((id) => {
                const row = stations[id];
                const cells = row
                    ? ["Soil Temp","Soil Moist","EC","PH","N","P","K"].map((key) => `<td>${dashboardData.formatNumber(row[key])}</td>`)
                    : ["","","","","","",""].map(() => "<td>--</td>");
                const status = row ? '<span class="badge bg-success">Online</span>' : '<span class="badge bg-secondary">Offline</span>';
                tbody.insertAdjacentHTML(
                    "beforeend",
                    `<tr>
                        <td>Station ${id}</td>
                        ${cells.join("")}
                        <td>${status}</td>
                    </tr>`
                );
            });
        }

        function showError(msg) {
            document.getElementById("table-body").innerHTML = `<tr><td colspan="9" class="text-danger text-center">${msg}</td></tr>`;
        }

        dashboardData.startPolling({ render: renderTable, onError: () => showError("無法連線到 Google Sheets") });
    </script>
</body>
</html>
